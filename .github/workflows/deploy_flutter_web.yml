name: Deploy Flutter Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloudburst_mobile/**"
      - ".github/workflows/deploy_flutter_web.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        working-directory: cloudburst_mobile
        run: flutter pub get

      - name: Build web app
        working-directory: cloudburst_mobile
        run: >
          flutter build web --release
          --base-href /CloudBurst-Risk-Estimation-System/
          --dart-define=CLOUDBURST_API_BASE_URL=${{ vars.CLOUDBURST_API_BASE_URL || 'https://hcis-api.onrender.com' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cloudburst_mobile/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
