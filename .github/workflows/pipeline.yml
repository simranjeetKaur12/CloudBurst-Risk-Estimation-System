name: Daily Offline Pipeline

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-latest-features:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure CDS API credentials
        env:
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        if: ${{ env.CDSAPI_URL != '' && env.CDSAPI_KEY != '' }}
        run: |
          cat <<EOF > ~/.cdsapirc
          url: $CDSAPI_URL
          key: $CDSAPI_KEY
          EOF

      - name: Run daily offline batch pipeline
        env:
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python src/pipelines/offline/run_daily_pipeline.py --days 10

      - name: Upload latest feature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latest-features
          path: |
            data/processed/latest_features_western.csv
            data/processed/latest_features_central.csv
            data/processed/latest_features_eastern.csv

      - name: Commit refreshed processed datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/latest_features_*.csv
          if git diff --cached --quiet; then
            echo "No processed updates to commit"
            exit 0
          fi
          git commit -m "chore(pipeline): refresh latest district features [skip ci]"
          git push
